<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrap { max-width: 400px; margin: 3rem auto; padding: 0 1rem; }
    .auth-footer { text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">✅ Task Manager</a>
  </nav>

  <div class="auth-wrap">
    <div class="card">
      <h2>Create account</h2>
      <div id="alert" class="alert"></div>

      <label>Username</label>
      <input type="text" id="username" placeholder="johndoe" />

      <label>Email</label>
      <input type="email" id="email" placeholder="john@example.com" />

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button class="btn btn-primary btn-full" onclick="register()">Register</button>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="login.html" class="link">Login</a>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    if (localStorage.getItem("token")) window.location.href = "tasks.html";

    async function register() {
      const username = document.getElementById("username").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !email || !password) return showAlert("All fields are required.", "error");

      try {
        await api("/register", "POST", { username, email, password });
        showAlert("Account created! Redirecting to login...", "success");
        setTimeout(() => window.location.href = "login.html", 1200);
      } catch (e) {
        showAlert(e.message, "error");
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById("alert");
      el.textContent = msg;
      el.className = `alert alert-${type}`;
      el.style.display = "block";
    }
  </script>
</body>
</html>
